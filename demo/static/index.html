<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>retro-pilot — Autonomous Incident Post-Mortem</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #7d8590; --accent: #58a6ff;
      --green: #3fb950; --red: #f85149; --yellow: #d29922;
      --orange: #f0883e; --purple: #bc8cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .tagline { color: var(--muted); font-size: 13px; }
    .main { display: grid; grid-template-columns: 300px 1fr; gap: 0; min-height: calc(100vh - 57px); }
    .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; }
    .sidebar h2 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    .scenario-btn { display: block; width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 6px; cursor: pointer; text-align: left; margin-bottom: 8px; transition: border-color 0.2s; }
    .scenario-btn:hover { border-color: var(--accent); }
    .scenario-btn.active { border-color: var(--accent); background: rgba(88,166,255,0.08); }
    .scenario-btn .label { font-weight: 500; margin-bottom: 4px; }
    .scenario-btn .meta { font-size: 12px; color: var(--muted); }
    .severity { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-right: 6px; }
    .SEV1 { background: rgba(248,81,73,0.2); color: var(--red); }
    .SEV2 { background: rgba(240,136,62,0.2); color: var(--orange); }
    .incident-card { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 14px; margin-bottom: 16px; }
    .incident-card .incident-title { font-weight: 600; margin-bottom: 8px; }
    .incident-meta { font-size: 12px; color: var(--muted); line-height: 1.8; }
    .similar-card { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; }
    .similar-card .sim-id { font-weight: 600; font-size: 12px; color: var(--accent); }
    .sim-score { font-size: 11px; color: var(--green); }
    .content { padding: 20px; overflow-y: auto; }
    .pipeline { margin-bottom: 24px; }
    .pipeline h2 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }
    .agent-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .agent-row:last-child { border-bottom: none; }
    .agent-indicator { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; background: var(--border); }
    .agent-indicator.running { background: var(--yellow); animation: pulse 1s infinite; }
    .agent-indicator.complete { background: var(--green); }
    .agent-indicator.failed { background: var(--red); }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .agent-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    .agent-output { font-size: 12px; color: var(--muted); }
    .eval-score { font-size: 12px; margin-top: 6px; }
    .eval-passed { color: var(--green); }
    .eval-failed { color: var(--yellow); }
    .sub-steps { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .sub-step { background: var(--border); border-radius: 4px; padding: 2px 8px; font-size: 11px; }
    .sub-step.complete { background: rgba(63,185,80,0.2); color: var(--green); }
    .results { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .result-card h3 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }
    .executive-summary { font-size: 14px; line-height: 1.6; color: var(--text); }
    .timeline-event { display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .timeline-event:last-child { border-bottom: none; }
    .ev-time { color: var(--muted); flex-shrink: 0; width: 50px; }
    .ev-sig { flex-shrink: 0; }
    .sig-critical { color: var(--red); }
    .sig-high { color: var(--orange); }
    .sig-medium { color: var(--yellow); }
    .sig-low { color: var(--muted); }
    .root-cause-primary { font-weight: 500; margin-bottom: 10px; padding: 10px; background: var(--bg); border-radius: 4px; font-size: 13px; }
    .contributing { margin-top: 8px; }
    .contributing li { font-size: 12px; color: var(--muted); padding: 4px 0; list-style: none; padding-left: 16px; position: relative; }
    .contributing li::before { content: "·"; position: absolute; left: 4px; }
    .action-item { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .action-item:last-child { border-bottom: none; }
    .ai-title { font-weight: 500; margin-bottom: 4px; }
    .ai-meta { color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }
    .priority { padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .P1 { background: rgba(248,81,73,0.2); color: var(--red); }
    .P2 { background: rgba(240,136,62,0.2); color: var(--orange); }
    .P3 { background: rgba(210,153,34,0.2); color: var(--yellow); }
    .score-bars { display: flex; flex-direction: column; gap: 8px; }
    .score-bar-row { display: flex; align-items: center; gap: 10px; font-size: 12px; }
    .score-bar-label { width: 140px; color: var(--muted); flex-shrink: 0; }
    .score-bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
    .score-bar-val { width: 36px; text-align: right; flex-shrink: 0; }
    .score-total { text-align: center; padding: 12px; margin-bottom: 12px; }
    .score-total .num { font-size: 36px; font-weight: 700; }
    .score-total .label { font-size: 12px; color: var(--muted); }
    .passed-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .badge-pass { background: rgba(63,185,80,0.2); color: var(--green); }
    .badge-fail { background: rgba(248,81,73,0.2); color: var(--red); }
    .revision-badge { background: rgba(240,136,62,0.2); color: var(--orange); font-size: 11px; padding: 2px 8px; border-radius: 4px; margin-left: 8px; }
    .placeholder { color: var(--muted); text-align: center; padding: 40px; }
    @media (max-width: 768px) {
      .main { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
      .results { grid-template-columns: 1fr; }
    }
    /* ── Tab bar ──────────────────────────────────── */
    .tab-bar { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; padding: 0 24px; }
    .tab-btn { background: none; border: none; color: var(--muted); padding: 12px 20px; cursor: pointer; font-size: 14px; font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    /* ── Review layout ───────────────────────────── */
    .review-layout { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 90px); }
    .review-sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 16px; overflow-y: auto; }
    .review-filters { display: flex; gap: 8px; margin-bottom: 16px; }
    .review-filters select { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 8px; border-radius: 6px; font-size: 13px; cursor: pointer; }
    .pm-card { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
    .pm-card:hover { border-color: var(--accent); }
    .pm-card.active { border-color: var(--accent); background: rgba(88,166,255,0.08); }
    .pm-card-title { font-weight: 500; font-size: 13px; margin-bottom: 6px; }
    .pm-card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .pm-date { font-size: 11px; color: var(--muted); }
    .eval-badge { font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 4px; }
    .eval-pass { background: rgba(63,185,80,0.2); color: var(--green); }
    .eval-warn { background: rgba(210,153,34,0.2); color: var(--yellow); }
    .eval-fail { background: rgba(248,81,73,0.2); color: var(--red); }
    .status-badge { font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 4px; }
    .status-draft { background: rgba(125,133,144,0.2); color: var(--muted); }
    .status-approved { background: rgba(63,185,80,0.2); color: var(--green); }
    .status-needs_changes { background: rgba(240,136,62,0.2); color: var(--orange); }
    .status-rejected { background: rgba(248,81,73,0.2); color: var(--red); }
    .pm-reviewer { font-size: 11px; color: var(--muted); margin-top: 4px; }
    /* ── Detail view ─────────────────────────────── */
    .review-detail { display: flex; flex-direction: column; overflow-y: auto; }
    .detail-scroll { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 160px; }
    .detail-header { margin-bottom: 20px; }
    .detail-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .detail-meta { font-size: 13px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; }
    .detail-section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    .detail-section h3 { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    .score-total-row { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
    .score-big { font-size: 32px; font-weight: 700; }
    .history-entry { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .history-entry:last-child { border-bottom: none; }
    .history-meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .history-comment { font-size: 12px; color: var(--text); margin-top: 4px; font-style: italic; }
    .ai-table { width: 100%; font-size: 12px; border-collapse: collapse; }
    .ai-table th { text-align: left; color: var(--muted); font-weight: 500; padding: 4px 8px 8px 0; border-bottom: 1px solid var(--border); }
    .ai-table td { padding: 6px 8px 6px 0; border-bottom: 1px solid var(--border); vertical-align: top; }
    .ai-table tr:last-child td { border-bottom: none; }
    /* ── Action bar ──────────────────────────────── */
    .action-bar { position: sticky; bottom: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 14px 20px; display: flex; flex-direction: column; gap: 10px; }
    .action-bar-inputs { display: flex; gap: 10px; }
    .action-bar input[type=text] { flex: 0 0 180px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 6px; font-size: 13px; }
    .action-bar input[type=text].error { border-color: var(--red); }
    .action-bar textarea { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 6px; font-size: 13px; resize: none; height: 38px; font-family: inherit; }
    .action-bar textarea.error { border-color: var(--red); }
    .action-btns { display: flex; gap: 8px; align-items: center; }
    .btn { padding: 7px 16px; border-radius: 6px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; }
    .btn-approve { background: rgba(63,185,80,0.2); color: var(--green); border: 1px solid rgba(63,185,80,0.4); }
    .btn-approve:hover { background: rgba(63,185,80,0.35); }
    .btn-changes { background: rgba(240,136,62,0.2); color: var(--orange); border: 1px solid rgba(240,136,62,0.4); }
    .btn-changes:hover { background: rgba(240,136,62,0.35); }
    .btn-reject { background: rgba(248,81,73,0.2); color: var(--red); border: 1px solid rgba(248,81,73,0.4); }
    .btn-reject:hover { background: rgba(248,81,73,0.35); }
    .action-error { color: var(--red); font-size: 12px; }
    .action-success { color: var(--green); font-size: 12px; }
    @media (max-width: 768px) {
      .review-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="header">
  <h1>retro-pilot</h1>
  <span class="tagline">Autonomous incident post-mortem system</span>
</div>
<div class="tab-bar">
  <button class="tab-btn active" id="tab-pipeline" onclick="switchTab('pipeline')">Pipeline</button>
  <button class="tab-btn" id="tab-review" onclick="switchTab('review')">Review</button>
</div>
<div id="view-pipeline">
<div class="main">
  <div class="sidebar">
    <h2>Scenarios</h2>
    <div id="scenario-list"></div>
    <div id="incident-card" style="display:none; margin-top:16px;">
      <h2>Incident</h2>
      <div class="incident-card">
        <div class="incident-title" id="inc-title"></div>
        <div class="incident-meta" id="inc-meta"></div>
      </div>
    </div>
    <div id="similar-section" style="display:none; margin-top:8px;">
      <h2>Similar Incidents</h2>
      <div id="similar-list"></div>
    </div>
  </div>
  <div class="content">
    <div id="placeholder" class="placeholder">Select a scenario to run the post-mortem pipeline</div>
    <div id="pipeline-section" style="display:none;">
      <div class="pipeline">
        <h2>Agent Pipeline</h2>
        <div id="agent-list"></div>
      </div>
      <div class="results" id="results-section" style="display:none;">
        <div class="result-card" style="grid-column:1/-1">
          <h3>Executive Summary</h3>
          <div class="executive-summary" id="exec-summary"></div>
        </div>
        <div class="result-card">
          <h3>Timeline (Top 5 Events)</h3>
          <div id="timeline-events"></div>
        </div>
        <div class="result-card">
          <h3>Root Cause</h3>
          <div id="root-cause"></div>
        </div>
        <div class="result-card">
          <h3>Action Items</h3>
          <div id="action-items"></div>
        </div>
        <div class="result-card">
          <h3>Evaluator Score</h3>
          <div id="eval-score"></div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>
<div id="view-review" style="display:none;" class="review-layout">
  <div class="review-sidebar">
    <div class="review-filters">
      <select id="filter-status" onchange="loadReviewList()">
        <option value="all">All statuses</option>
        <option value="draft">Draft</option>
        <option value="approved">Approved</option>
        <option value="needs_changes">Needs changes</option>
        <option value="rejected">Rejected</option>
      </select>
      <select id="filter-severity" onchange="loadReviewList()">
        <option value="all">All severities</option>
        <option value="SEV1">SEV1</option>
        <option value="SEV2">SEV2</option>
        <option value="SEV3">SEV3</option>
        <option value="SEV4">SEV4</option>
      </select>
    </div>
    <div id="pm-list"><div class="placeholder">Loading&hellip;</div></div>
  </div>
  <div class="review-detail" id="review-detail">
    <div class="detail-scroll">
      <div class="placeholder" style="margin-top:80px;">Select a post-mortem to review</div>
    </div>
  </div>
</div>
<script>
const IS_STATIC = window.location.protocol === 'file:' || !window.location.hostname || window.location.hostname === '';

async function loadScenarios() {
  if (IS_STATIC) {
    const ids = ['redis-cascade', 'deploy-regression', 'certificate-expiry'];
    const labels = ['Redis Cascade (SEV1)', 'Deploy Regression (SEV2)', 'Certificate Expiry (SEV2)'];
    const sevs = ['SEV1', 'SEV2', 'SEV2'];
    renderScenarioButtons(ids.map((id, i) => ({id, label: labels[i], severity: sevs[i]})));
    return;
  }
  const res = await fetch('/scenarios');
  const data = await res.json();
  renderScenarioButtons(data.scenarios);
}

function renderScenarioButtons(scenarios) {
  const el = document.getElementById('scenario-list');
  el.innerHTML = '';
  scenarios.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'scenario-btn';
    btn.dataset.id = s.id;
    btn.innerHTML = `<div class="label"><span class="severity ${s.severity}">${s.severity}</span>${s.label}</div>
      <div class="meta">${s.incident_id || ''}</div>`;
    btn.addEventListener('click', () => runScenario(s.id, btn));
    el.appendChild(btn);
  });
}

async function runScenario(id, btn) {
  document.querySelectorAll('.scenario-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('pipeline-section').style.display = 'block';
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('agent-list').innerHTML = '';
  document.getElementById('incident-card').style.display = 'none';
  document.getElementById('similar-section').style.display = 'none';

  if (IS_STATIC) {
    await runStaticScenario(id);
  } else {
    await runSSEScenario(id);
  }
}

async function runStaticScenario(id) {
  const res = await fetch(`scenarios/${id}.json`);
  const data = await res.json();
  renderIncident(data.incident);
  renderSimilar(data.similar_incidents_retrieved || []);
  let lastEval = null;
  for (const step of data.pipeline_steps) {
    await new Promise(r => setTimeout(r, step.status === 'running' ? 400 : 800));
    renderStep(step);
    if (step.evaluation) lastEval = step.evaluation;
  }
  renderResults(data.postmortem_final, data, lastEval);
}

async function runSSEScenario(id) {
  const es = new EventSource(`/run/${id}`);
  let lastEval = null;
  const scenarioData = await fetch(`/scenario/${id}`).then(r => r.json());

  es.addEventListener('incident', e => renderIncident(JSON.parse(e.data)));
  es.addEventListener('similar_incidents', e => renderSimilar(JSON.parse(e.data)));
  es.addEventListener('step', e => {
    const step = JSON.parse(e.data);
    renderStep(step);
    if (step.evaluation) lastEval = step.evaluation;
  });
  es.addEventListener('postmortem', e => {
    const pm = JSON.parse(e.data);
    renderResults(pm, scenarioData, lastEval);
    es.close();
  });
  es.addEventListener('done', () => es.close());
  es.onerror = () => es.close();
}

function renderIncident(inc) {
  document.getElementById('incident-card').style.display = 'block';
  document.getElementById('inc-title').textContent = inc.title;
  const start = new Date(inc.started_at);
  const end = new Date(inc.resolved_at);
  const dur = Math.round((end - start) / 60000);
  document.getElementById('inc-meta').innerHTML =
    `<span class="severity ${inc.severity}">${inc.severity}</span>${inc.id}<br>
     Duration: ${dur} minutes<br>
     Services: ${inc.affected_services.join(', ')}`;
}

function renderSimilar(similar) {
  if (!similar || similar.length === 0) return;
  document.getElementById('similar-section').style.display = 'block';
  const el = document.getElementById('similar-list');
  el.innerHTML = similar.map(s => `
    <div class="similar-card">
      <div class="sim-id">${s.id}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;">${s.title || ''}</div>
      <div class="sim-score">Similarity: ${(s.similarity_score * 100).toFixed(0)}%</div>
    </div>`).join('');
}

function renderStep(step) {
  let row = document.getElementById(`agent-${step.agent}`);
  if (!row) {
    row = document.createElement('div');
    row.className = 'agent-row';
    row.id = `agent-${step.agent}`;
    row.innerHTML = `<div class="agent-indicator" id="ind-${step.agent}"></div>
      <div>
        <div class="agent-name">${step.agent}${step.revision_number > 0 ? `<span class="revision-badge">Revision ${step.revision_number}</span>` : ''}</div>
        <div class="agent-output" id="out-${step.agent}"></div>
      </div>`;
    document.getElementById('agent-list').appendChild(row);
  }
  const ind = document.getElementById(`ind-${step.agent}`);
  if (ind) { ind.className = `agent-indicator ${step.status}`; }
  const out = document.getElementById(`out-${step.agent}`);
  if (out) {
    let html = step.output || '';
    if (step.sub_steps) {
      html += `<div class="sub-steps">${step.sub_steps.map(s =>
        `<span class="sub-step ${s.status}">${s.worker}</span>`).join('')}</div>`;
    }
    if (step.evaluation) {
      const ev = step.evaluation;
      const cls = ev.passed ? 'eval-passed' : 'eval-failed';
      html += `<div class="eval-score ${cls}">Score: ${ev.total.toFixed(2)} — ${ev.passed ? '&#10003; PASSED' : '&#8634; REVISION REQUESTED'}</div>`;
    }
    out.innerHTML = html;
  }
}

function renderResults(pm, data, lastEval) {
  document.getElementById('results-section').style.display = 'grid';
  document.getElementById('exec-summary').textContent = pm.executive_summary || '';

  const tlStep = (data.pipeline_steps || []).find(s => s.agent === 'TimelineBuilder' && s.timeline);
  if (tlStep && tlStep.timeline) {
    const top5 = [...tlStep.timeline.events]
      .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp))
      .filter(e => ['critical','high'].includes(e.significance))
      .slice(0, 5);
    document.getElementById('timeline-events').innerHTML = top5.map(e => {
      const t = new Date(e.timestamp);
      const time = `${String(t.getUTCHours()).padStart(2,'0')}:${String(t.getUTCMinutes()).padStart(2,'0')}`;
      return `<div class="timeline-event">
        <span class="ev-time">${time}</span>
        <span class="ev-sig sig-${e.significance}">&#9679;</span>
        <span>${e.description}</span></div>`;
    }).join('');
  }

  const rcStep = (data.pipeline_steps || []).find(s => s.agent === 'RootCauseAnalyst' && s.root_cause);
  if (rcStep && rcStep.root_cause) {
    const rc = rcStep.root_cause;
    document.getElementById('root-cause').innerHTML =
      `<div class="root-cause-primary">${rc.primary}</div>
       <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">Contributing factors:</div>
       <ul class="contributing">${rc.contributing_factors.map(f => `<li>${f}</li>`).join('')}</ul>`;
  }

  const aiStep = (data.pipeline_steps || []).find(s => s.agent === 'ActionItemGenerator' && s.action_items);
  if (aiStep && aiStep.action_items) {
    document.getElementById('action-items').innerHTML = aiStep.action_items.map(ai =>
      `<div class="action-item">
        <div class="ai-title">${ai.title}</div>
        <div class="ai-meta">
          <span class="priority ${ai.priority}">${ai.priority}</span>
          <span>${ai.owner_role}</span>
          <span>${ai.deadline_days}d</span>
          <span style="color:var(--accent)">${ai.type}</span>
        </div></div>`).join('');
  }

  if (lastEval) {
    const color = lastEval.passed ? '#3fb950' : '#f85149';
    const dims = [
      ['Timeline', lastEval.timeline_completeness],
      ['Root Cause', lastEval.root_cause_clarity],
      ['Action Items', lastEval.action_item_quality],
      ['Exec Summary', lastEval.executive_summary_clarity],
      ['Similar Incidents', lastEval.similar_incidents_referenced],
    ];
    document.getElementById('eval-score').innerHTML =
      `<div class="score-total">
        <div class="num" style="color:${color}">${lastEval.total.toFixed(2)}</div>
        <div class="label">total score</div>
        <div style="margin-top:6px"><span class="passed-badge ${lastEval.passed ? 'badge-pass' : 'badge-fail'}">${lastEval.passed ? '&#10003; PASSED' : '&#10007; FAILED'}</span></div>
        ${lastEval.revision_number > 0 ? `<div style="margin-top:6px;font-size:12px;color:var(--muted)">After ${lastEval.revision_number} revision(s)</div>` : ''}
      </div>
      <div class="score-bars">${dims.map(([label, val]) => {
        const pct = (val * 100).toFixed(0);
        const barColor = val >= 0.80 ? '#3fb950' : val >= 0.60 ? '#d29922' : '#f85149';
        return `<div class="score-bar-row">
          <span class="score-bar-label">${label}</span>
          <div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
          <span class="score-bar-val" style="color:${barColor}">${(val).toFixed(2)}</span>
        </div>`;
      }).join('')}</div>`;
  }
}

loadScenarios();

// ── Utilities ─────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Tab switching ──────────────────────────────────
function switchTab(tab) {
  document.getElementById('view-pipeline').style.display = tab === 'pipeline' ? '' : 'none';
  document.getElementById('view-review').style.display = tab === 'review' ? '' : 'none';
  document.getElementById('tab-pipeline').classList.toggle('active', tab === 'pipeline');
  document.getElementById('tab-review').classList.toggle('active', tab === 'review');
  if (tab === 'review') loadReviewList();
}

// ── Review list ────────────────────────────────────
let _currentPMId = null;

async function loadReviewList() {
  if (IS_STATIC) {
    document.getElementById('pm-list').innerHTML =
      '<div class="placeholder" style="font-size:12px;padding:20px;">Review requires the local server.<br>Run: <code>uvicorn demo.app:app --reload</code></div>';
    return;
  }
  const status = document.getElementById('filter-status').value;
  const severity = document.getElementById('filter-severity').value;
  const res = await fetch(`/postmortems?status=${status}&severity=${severity}`);
  if (!res.ok) {
    document.getElementById('pm-list').innerHTML = '<div class="placeholder">Failed to load. <a href="#" onclick="loadReviewList();return false">Retry</a></div>';
    return;
  }
  const pms = await res.json();
  if (pms.length === 0) {
    document.getElementById('pm-list').innerHTML = '<div class="placeholder" style="font-size:12px;padding:20px;">No post-mortems match these filters.</div>';
    return;
  }
  document.getElementById('pm-list').innerHTML = pms.map(pm => {
    const evalClass = pm.evaluator_total >= 0.80 ? 'eval-pass' : pm.evaluator_total >= 0.60 ? 'eval-warn' : 'eval-fail';
    const statusLabel = pm.status === 'needs_changes' ? 'Needs changes' : pm.status.charAt(0).toUpperCase() + pm.status.slice(1);
    const date = new Date(pm.started_at).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
    return `<div class="pm-card${_currentPMId === pm.id ? ' active' : ''}" onclick="openPMDetail('${pm.id}', this)">
      <div class="pm-card-title"><span class="severity ${pm.severity}">${pm.severity}</span>${pm.title}</div>
      <div class="pm-card-meta">
        <span class="pm-date">${date}</span>
        <span class="eval-badge ${evalClass}">${pm.evaluator_total.toFixed(2)}</span>
        <span class="status-badge status-${pm.status}">${statusLabel}</span>
      </div>
      ${pm.last_reviewer ? `<div class="pm-reviewer">Reviewed by ${escHtml(pm.last_reviewer)}</div>` : ''}
    </div>`;
  }).join('');
}

// ── Post-mortem detail ─────────────────────────────
async function openPMDetail(id, cardEl) {
  _currentPMId = id;
  document.querySelectorAll('.pm-card').forEach(c => c.classList.remove('active'));
  if (cardEl) cardEl.classList.add('active');
  const res = await fetch(`/postmortems/${id}`);
  if (!res.ok) {
    document.getElementById('review-detail').innerHTML = '<div class="detail-scroll"><div class="placeholder">Post-mortem not found.</div></div>';
    return;
  }
  const data = await res.json();
  renderDetail(data);
}

function renderDetail(data) {
  const pm = data.postmortem;
  const inc = pm.incident;
  const scores = pm.evaluator_scores || {};
  const history = data.review_history || [];
  const status = data.status;
  const scoreColor = scores.total >= 0.80 ? 'var(--green)' : scores.total >= 0.60 ? 'var(--yellow)' : 'var(--red)';
  const statusLabel = status === 'needs_changes' ? 'Needs changes' : status.charAt(0).toUpperCase() + status.slice(1);
  const startDate = new Date(inc.started_at).toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric', timeZone:'UTC'});

  const dimLabels = [
    ['Timeline Completeness', scores.timeline_completeness],
    ['Root Cause Clarity', scores.root_cause_clarity],
    ['Action Item Quality', scores.action_item_quality],
    ['Executive Summary', scores.executive_summary_clarity],
    ['Similar Incidents', scores.similar_incidents_referenced],
  ];

  const historyHtml = history.length === 0
    ? '<div style="color:var(--muted);font-size:12px;">No reviews yet.</div>'
    : history.map(h => {
        const actionLabel = h.action === 'approve' ? 'Approved' : h.action === 'request_changes' ? 'Changes Requested' : 'Rejected';
        const actionColor = h.action === 'approve' ? 'var(--green)' : h.action === 'request_changes' ? 'var(--orange)' : 'var(--red)';
        const ts = new Date(h.timestamp).toLocaleString('en-US', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', timeZone:'UTC'});
        return `<div class="history-entry">
          <div><span class="status-badge" style="background:rgba(0,0,0,0.2);color:${actionColor}">${actionLabel}</span></div>
          <div>
            <div class="history-meta">${escHtml(h.reviewer)} &mdash; ${ts}</div>
            ${h.comment ? `<div class="history-comment">"${escHtml(h.comment)}"</div>` : ''}
          </div>
        </div>`;
      }).join('');

  const actionItemsHtml = (pm.action_items || []).map(ai => `
    <tr>
      <td>${ai.title}</td>
      <td>${ai.owner_role}</td>
      <td>${ai.deadline_days}d</td>
      <td><span class="priority ${ai.priority}">${ai.priority}</span></td>
      <td style="color:var(--accent)">${ai.type}</td>
    </tr>`).join('');

  document.getElementById('review-detail').innerHTML = `
    <div class="detail-scroll">
      <div class="detail-header">
        <div class="detail-title"><span class="severity ${inc.severity}">${inc.severity}</span> ${inc.title}</div>
        <div class="detail-meta">
          <span>${inc.id}</span>
          <span>${startDate}</span>
          <span>${pm.timeline.resolution_duration_minutes} min outage (UTC)</span>
          <span>Services: ${inc.affected_services.join(', ')}</span>
          <span class="status-badge status-${status}">${statusLabel}</span>
        </div>
      </div>

      <div class="detail-section">
        <h3>Evaluator Score</h3>
        <div class="score-total-row">
          <div class="score-big" style="color:${scoreColor}">${scores.total.toFixed(2)}</div>
          <span class="passed-badge ${scores.total >= 0.80 ? 'badge-pass' : 'badge-fail'}">${scores.total >= 0.80 ? '✓ PASSED' : '✗ BELOW THRESHOLD'}</span>
          ${pm.revision_count > 0 ? `<span class="revision-badge">${pm.revision_count} revision(s)</span>` : ''}
        </div>
        <div class="score-bars">${dimLabels.map(([label, val]) => {
          const pct = (val * 100).toFixed(0);
          const bc = val >= 0.80 ? '#3fb950' : val >= 0.60 ? '#d29922' : '#f85149';
          return `<div class="score-bar-row">
            <span class="score-bar-label">${label}</span>
            <div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%;background:${bc}"></div></div>
            <span class="score-bar-val" style="color:${bc}">${val.toFixed(2)}</span>
          </div>`;
        }).join('')}</div>
      </div>

      <div class="detail-section">
        <h3>Executive Summary</h3>
        <div class="executive-summary">${pm.executive_summary}</div>
      </div>

      <div class="detail-section">
        <h3>Root Cause</h3>
        <div class="root-cause-primary">${pm.root_cause.primary}</div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">Contributing factors:</div>
        <ul class="contributing">${pm.root_cause.contributing_factors.map(f => `<li>${f}</li>`).join('')}</ul>
        <div style="margin-top:10px;font-size:12px;color:var(--muted);">Trigger: <span style="color:var(--text)">${pm.root_cause.trigger}</span></div>
        <div style="font-size:12px;color:var(--muted);">Blast radius: <span style="color:var(--text)">${pm.root_cause.blast_radius}</span></div>
        <div style="font-size:12px;color:var(--muted);">Confidence: <span class="passed-badge ${pm.root_cause.confidence === 'HIGH' ? 'badge-pass' : 'badge-fail'}">${pm.root_cause.confidence}</span></div>
      </div>

      <div class="detail-section">
        <h3>Action Items</h3>
        <table class="ai-table">
          <thead><tr><th>Title</th><th>Owner</th><th>Deadline</th><th>Priority</th><th>Type</th></tr></thead>
          <tbody>${actionItemsHtml}</tbody>
        </table>
      </div>

      <div class="detail-section">
        <h3>Timeline (${pm.timeline.events.length} events)</h3>
        ${pm.timeline.events.map(e => {
          const t = new Date(e.timestamp);
          const time = String(t.getUTCHours()).padStart(2,'0') + ':' + String(t.getUTCMinutes()).padStart(2,'0');
          return `<div class="timeline-event">
            <span class="ev-time">${time}</span>
            <span class="ev-sig sig-${e.significance}">&#9679;</span>
            <span>${e.description}</span>
          </div>`;
        }).join('')}
        <div style="font-size:11px;color:var(--muted);margin-top:8px;">Detection lag: ${pm.timeline.detection_lag_minutes} min</div>
      </div>

      <div class="detail-section">
        <h3>Lessons Learned</h3>
        <ul class="contributing">${pm.lessons_learned.map(l => `<li style="color:var(--text)">${l}</li>`).join('')}</ul>
      </div>

      <div class="detail-section">
        <h3>Review History</h3>
        ${historyHtml}
      </div>
    </div>

    <div class="action-bar">
      <div class="action-bar-inputs">
        <input type="text" id="reviewer-name" placeholder="Your name (required)" />
        <textarea id="review-comment" placeholder="Comment (required for Request Changes, optional otherwise)"></textarea>
      </div>
      <div class="action-btns">
        <button class="btn btn-approve" onclick="submitReview('approve')">Approve</button>
        <button class="btn btn-changes" onclick="submitReview('request_changes')">Request Changes</button>
        <button class="btn btn-reject" onclick="submitReview('reject')">Reject</button>
        <span id="action-feedback"></span>
      </div>
    </div>
  `;
}

// ── Submit review ──────────────────────────────────
async function submitReview(action) {
  const nameEl = document.getElementById('reviewer-name');
  const commentEl = document.getElementById('review-comment');
  const feedbackEl = document.getElementById('action-feedback');
  const name = nameEl.value.trim();
  const comment = commentEl.value.trim();

  nameEl.classList.remove('error');
  commentEl.classList.remove('error');
  feedbackEl.className = '';
  feedbackEl.textContent = '';

  if (!name) {
    nameEl.classList.add('error');
    feedbackEl.className = 'action-error';
    feedbackEl.textContent = 'Reviewer name is required.';
    return;
  }
  if (action === 'request_changes' && !comment) {
    commentEl.classList.add('error');
    feedbackEl.className = 'action-error';
    feedbackEl.textContent = 'Comment is required when requesting changes.';
    return;
  }

  const res = await fetch(`/postmortems/${_currentPMId}/review`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({action, reviewer: name, comment: comment || null}),
  });
  if (!res.ok) {
    feedbackEl.className = 'action-error';
    feedbackEl.textContent = 'Failed to save review. Try again.';
    return;
  }
  const data = await res.json();
  const label = action === 'approve' ? 'Approved' : action === 'request_changes' ? 'Changes requested' : 'Rejected';
  feedbackEl.className = 'action-success';
  feedbackEl.textContent = `✓ ${label} — recorded at ${new Date(data.recorded_at).toLocaleTimeString('en-US', {timeZone:'UTC'})} UTC`;
  // Brief pause so the user sees the confirmation before the view refreshes
  await new Promise(r => setTimeout(r, 1200));
  await openPMDetail(_currentPMId, null);
  await loadReviewList();
}
</script>
